<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Адаптивный лэйаут без @media</title>
    <link
      rel="stylesheet"
      href="https://code.s3.yandex.net/web-code/fonts/fonts.css"
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <ul class="cards-list">
      <li class="cards-list__item">
        <article class="card">
          <img
            src="./images/egor.jpg"
            alt="Фото Егора Летова, смотрящего на солнце в тёмных очках"
            class="card__image"
          />
          <div class="card__description">
            <h2 class="card__title">Егор Летов</h2>
            <p class="card__paragraph">Он увидел солнце</p>
          </div>
        </article>
      </li>
    </ul>
  </body>
</html>
